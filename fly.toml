# Fly.io config for the GamePulse API
# Deploy: fly launch --config fly.toml --name gamepulse-api

app = "gamepulse-api"
primary_region = "iad"

[build]
  dockerfile = "services/api/Dockerfile"
  build-target = "runtime"

[env]
  GAMEPULSE_ENV = "production"
  GAMEPULSE_API_LOG_LEVEL = "INFO"
  GAMEPULSE_API_PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    path = "/healthz"
    interval = "10s"
    timeout = "5s"
    grace_period = "15s"

[mounts]
  # Uncomment if you add file-based offline event persistence:
  # source = "gamepulse_data"
  # destination = "/data"
