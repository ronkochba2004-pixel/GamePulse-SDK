[project]
name = "gamepulse-sdk"
version = "0.1.0"
description = "GamePulse Python SDK"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "gamepulse-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gamepulse"]
