[project]
name = "gamepulse-sdk"
version = "0.1.0"
description = "Python SDK for the GamePulse self-hosted game analytics platform"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Ron Kochba", email = "ronkochba2004@gmail.com" },
]
requires-python = ">=3.11"
keywords = ["analytics", "game-analytics", "telemetry", "sdk", "games", "gamedev", "tracking"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Games/Entertainment",
    "Typing :: Typed",
]
dependencies = [
    "gamepulse-core>=0.1.0",
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://github.com/ronkochba2004-pixel/GamePulse-SDK"
Documentation = "https://github.com/ronkochba2004-pixel/GamePulse-SDK/blob/master/packages/gamepulse-sdk/README.md"
Repository = "https://github.com/ronkochba2004-pixel/GamePulse-SDK"
"Bug Tracker" = "https://github.com/ronkochba2004-pixel/GamePulse-SDK/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gamepulse"]
