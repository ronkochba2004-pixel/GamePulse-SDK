[project]
name = "gamepulse-simulator"
version = "0.1.0"
description = "Synthetic player traffic generator for GamePulse"
requires-python = ">=3.11"
dependencies = [
    "gamepulse-sdk",
    "gamepulse-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["simulator"]
