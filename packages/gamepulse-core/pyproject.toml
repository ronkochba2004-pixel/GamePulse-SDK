[project]
name = "gamepulse-core"
version = "0.1.0"
description = "Shared models, enums, and schemas for the GamePulse platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gamepulse_core"]
