name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pytest
        env:
          # API tests use the fake Supabase fixture; these placeholders
          # only need to exist for `Settings()` to construct successfully.
          SUPABASE_URL: http://fake
          SUPABASE_SERVICE_ROLE_KEY: fake
        run: uv run pytest -q

  mypy:
    runs-on: ubuntu-latest
    continue-on-error: true   # informational until type debt is paid down
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - run: uv run mypy packages services
